name: native-release

# Native (Rust + Slint) low-RAM build for Linux, macOS and Windows. Triggered by
# `native-v*` tags and published as the repo's latest release (native is now the
# primary build). The in-app native updater finds the right binary by scanning
# `native-v*` tags for an `eyecare-native-<os>-*` asset.
# NOTE: this supersedes the Tauri `latest.json` auto-updater — promote was an
# explicit choice; the old Tauri app's in-app updater no longer resolves.
on:
  push:
    tags:
      - 'native-v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: eyecare-native-linux-x86_64
            bin: eyecare-native
          - os: macos-latest
            asset: eyecare-native-macos-aarch64
            bin: eyecare-native
          - os: windows-latest
            asset: eyecare-native-windows-x86_64.exe
            bin: eyecare-native.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps (winit / femtovg / dbus tray)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfontconfig1-dev libxcb1-dev libxkbcommon-dev \
            libwayland-dev libxkbcommon-x11-dev libdbus-1-dev \
            libx11-dev libxext-dev libxss-dev

      - uses: dtolnay/rust-toolchain@stable

      - name: Build release
        working-directory: native
        run: cargo build --release

      - name: Stage asset
        shell: bash
        run: |
          mkdir -p dist
          cp "native/target/release/${{ matrix.bin }}" "dist/${{ matrix.asset }}"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: false
          make_latest: true
          name: EyeCare native ${{ github.ref_name }}
          files: dist/${{ matrix.asset }}
          body: |
            **EyeCare — native (Rust + Slint) low-RAM build.**

            ~44 MB RAM vs the Tauri build's ~600 MB. Same 20-20-20 break reminder,
            floating widget, settings, eye-health nudges, global shortcuts and
            in-app updater.

            | OS | Asset |
            |----|-------|
            | Linux x86_64 | `eyecare-native-linux-x86_64` |
            | macOS (Apple Silicon) | `eyecare-native-macos-aarch64` |
            | Windows x86_64 | `eyecare-native-windows-x86_64.exe` |

            Auto-updates via the in-app updater (Settings → Updates). Prerelease —
            does **not** affect the main Tauri app or its updater.
