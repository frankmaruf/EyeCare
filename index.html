<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EyeCare</title>
    <!-- Early, classic (non-module) error catcher. Runs immediately regardless
         of module timing, so any failure shows on screen instead of a blank
         white window — and tells us whether the module even executed. -->
    <script>
      (function () {
        function show(msg) {
          var wrap = document.getElementById("ec-err");
          if (!wrap) {
            wrap = document.createElement("div");
            wrap.id = "ec-err";
            wrap.style.cssText =
              "position:fixed;left:0;right:0;bottom:0;max-height:45vh;overflow:auto;background:#1a0f14ee;color:#ff9a9a;border-top:1px solid #5b2b34;font:12px/1.5 ui-monospace,monospace;z-index:99999";
            var close = document.createElement("button");
            close.textContent = "✕ dismiss";
            close.style.cssText =
              "position:sticky;top:0;float:right;margin:6px;padding:4px 10px;border:0;border-radius:6px;background:#5b2b34;color:#ffd6d6;cursor:pointer";
            close.onclick = function () {
              wrap.remove();
            };
            var pre = document.createElement("pre");
            pre.id = "ec-err-body";
            pre.style.cssText =
              "margin:0;padding:14px;white-space:pre-wrap;word-break:break-word";
            wrap.appendChild(close);
            wrap.appendChild(pre);
            (document.body || document.documentElement).appendChild(wrap);
          }
          document.getElementById("ec-err-body").textContent += msg + "\n\n";
        }
        window.addEventListener("error", function (e) {
          show(
            "ERROR: " +
              (e.message || e.error) +
              (e.filename ? "  @ " + e.filename + ":" + e.lineno : ""),
          );
        });
        window.addEventListener("unhandledrejection", function (e) {
          var r = e.reason;
          show("PROMISE REJECTED: " + (r && (r.stack || r.message || r)));
        });
        // Marker so we can tell "module never ran" (placeholder stays) from
        // "module ran and replaced #app".
        window.__ecBooted = false;
      })();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body>
    <div id="app">
      <div
        style="display:flex;align-items:center;justify-content:center;height:100vh;color:#93a3bd;font:14px system-ui,sans-serif"
      >
        Starting EyeCare…
      </div>
    </div>
  </body>
</html>
